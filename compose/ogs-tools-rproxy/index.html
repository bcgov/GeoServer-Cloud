<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Public GeoServer Management Tools</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f8fb;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
		}
		.container {
			background: #fff;
			padding: 2rem 3rem;
			border-radius: 12px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.08);
			text-align: center;
		}
		h1 {
			color: #2a4d69;
			margin-bottom: 1.5em;
		}
		p {
			color: #4b5d67;
			margin-bottom: 2em;
		}
		a.button {
			display: inline-block;
			padding: 0.75em 2em;
			background: #1976d2;
			color: #fff;
			border-radius: 6px;
			text-decoration: none;
			font-size: 1.1em;
			transition: background 0.2s;
		}
		a.button:hover {
			background: #125ea2;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>OGS Management Tools</h1>
		<p></p>
		<a class="button" href="/pgadmin/" target="_blank">Open pgAdmin</a>
	</div>
</body>
</html>
